name: Create vercel preview URL on pull request

on:
  pull_request:
    branches:
      - develop3

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel deploy --token=${{ secrets.VERCEL_TOKEN }} > preview.txt

      - name: Show preview URL
        run: cat preview.txt